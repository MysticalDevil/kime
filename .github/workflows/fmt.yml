name: fmt

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  gofumpt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Check formatting
        env:
          GOEXPERIMENT: jsonv2
        run: |
          diff=$(go tool gofumpt -d .)
          if [ -n "$diff" ]; then
            echo "$diff"
            exit 1
          fi
